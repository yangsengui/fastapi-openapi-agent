name: openagent

env:
  APP_ENV: development
  PYTHONUNBUFFERED: "1"

services:
  api:
    command: "set -a; . ./.env; set +a; exec python -m uvicorn examples.demo:app --host 0.0.0.0 --port $PORT --reload"
    workdir: .
    port: auto
    publish: true
    restart: on-failure
    env:
      APP_NAME: "openagent"

scripts:
  install: python -m pip install -e ".[dev,docs]" && npm install --prefix frontend
  build: npm run build --prefix frontend
  docs: mkdocs serve
  docs-build: mkdocs build --strict
  dev: devyard up
  test: npm run check --prefix frontend && npm run build --prefix frontend && pytest
