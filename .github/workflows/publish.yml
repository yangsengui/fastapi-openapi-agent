name: Publish Python Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish validated distributions to PyPI
        required: true
        type: boolean
        default: false

concurrency:
  group: publish-pypi
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Check frontend types
        run: npm run check --prefix frontend

      - name: Build frontend assets
        run: npm run build --prefix frontend

      - name: Install Python dependencies
        run: python -m pip install --upgrade ".[dev,llm]"

      - name: Run tests
        run: pytest

      - name: Verify release version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          package_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          tag_version="${RELEASE_TAG#v}"
          if [ "$tag_version" != "$package_version" ]; then
            echo "Release tag $RELEASE_TAG does not match package version $package_version" >&2
            exit 1
          fi

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    if: github.event_name == 'release' || inputs.publish
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fastapi-openapi-agent

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
