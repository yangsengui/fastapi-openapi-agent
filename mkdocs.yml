site_name: OpenAgent
site_description: 从高质量 OpenAPI 定义一行生成可对话、可执行的 API Agent
site_url: https://yangsengui.github.io/fastapi-openapi-agent/
repo_url: https://github.com/yangsengui/fastapi-openapi-agent
repo_name: yangsengui/fastapi-openapi-agent
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

nav:
  - 项目介绍: index.md
  - 5 分钟开始: getting-started.md
  - 核心概念:
      - OpenAPI 如何变成 Agent: concepts/openapi-to-agent.md
      - OpenAPI 质量指南: guides/openapi-quality.md
      - 嵌入式 Agent 还是 MCP Server: guides/embedded-agent-vs-mcp.md
  - 使用指南:
      - 配置与模型: guides/configuration.md
      - 前端嵌入: guides/embedding.md
      - 认证与安全: guides/security.md
  - 参考:
      - Python API: reference/python-api.md
      - HTTP 与 SSE 协议: reference/http-api.md
  - 参与项目:
      - 开发与贡献: development.md
      - 常见问题: faq.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search:
      lang:
        - zh
        - en
  - i18n:
      docs_structure: suffix
      fallback_to_default: false
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
          site_description: Build a conversational, executable API Agent from a high-quality OpenAPI definition in one line
          nav_translations:
            项目介绍: Overview
            5 分钟开始: 5-minute quickstart
            核心概念: Core concepts
            OpenAPI 如何变成 Agent: How OpenAPI becomes an Agent
            OpenAPI 质量指南: OpenAPI quality guide
            嵌入式 Agent 还是 MCP Server: Embedded Agent or MCP Server
            使用指南: Guides
            配置与模型: Configuration and models
            前端嵌入: Frontend embedding
            认证与安全: Authentication and security
            参考: Reference
            HTTP 与 SSE 协议: HTTP and SSE protocols
            参与项目: Project
            开发与贡献: Development and contribution
            常见问题: FAQ
        - locale: zh
          name: 简体中文
          build: true

